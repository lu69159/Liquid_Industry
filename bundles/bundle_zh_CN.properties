#主线
sector.液体工艺-测试区.name = 测试区
sector.液体工艺-测试区.description = 第一个测试地图！

sector.液体工艺-狭长冰谷.name = 狭长冰谷
sector.液体工艺-狭长冰谷.description = 不见天日的寒冷峡谷，矿物稀缺，在此开始探索星球上液体资源的利用方式。\n不要因为前期看似充足的时间而放松警惕。

sector.液体工艺-极冰溶洞.name = 极冰溶洞
sector.液体工艺-极冰溶洞.description = 寒冷液体侵蚀形成的巨大露天溶洞，暗无天日，敌人盘踞于此。\n回收附近遗留的废墟，研究液体资源的进阶利用方式。尽快摧毁所有敌方核心。

sector.液体工艺-永夜荒地.name = 永夜荒地
sector.液体工艺-永夜荒地.description = 极冰溶洞深处巨大空间中的一处遗迹，曾是该星球旧文明的发源地之一。\n开始研究从液体中提取合成物质的相关科技，在敌人主力到达前建立好防线。

sector.液体工艺-极光壁垒.name = 极光壁垒
sector.液体工艺-极光壁垒.description = 继续深入洞穴，我们发现了一批敌人据守于此地，看守着某些原型武器的科技。\n摧毁所有的敌方核心，并探索三级液体资源的利用方式。\n不要把时间拖得太久，以免敌方支援反扑。

#支线
sector.液体工艺-蛇行道.name = 蛇行道
sector.液体工艺-蛇行道.description = [yellow]解锁埋伏\n[yellow]解锁超冷混合器\n\[yellow]解锁巨蟹\n[white]狭窄的洞穴通道中部坐落着尼普顿旧文明的科技废墟，抵御敌人的猛攻以让后勤部队有时间研究其科技。\n(PS：侦测到绝大部分来袭敌方为重型单位，务必加强火力！)

sector.液体工艺-地火.name = 地火
sector.液体工艺-地火.description = [yellow]解锁倍乘级单位直构工厂及后续科技\n[]前锋部队已经探查到前方存在着一条直通地表的熔岩带，敌人的直构工厂科技坐落于此。\n抵御敌人的反扑，坚守到科技研究完成。



