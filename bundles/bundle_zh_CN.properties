block.液体工艺-人造太阳.description = 全图照明。

block.液体工艺-超速天穹.name = 超速天穹
block.液体工艺-超速天穹.description = 提高附近建筑物的工作效率，需要冷冻液维持运行。\n可使用相织布提高范围和效率。

block.液体工艺-超频投影.name = 超频投影
block.液体工艺-超频投影.description = 为附近的单位提供超频状态。

block.液体工艺-保护投影.name = 保护投影
block.液体工艺-保护投影.description = 为附近的单位提供保护状态。

block.液体工艺-解冻投影.name = 解冻投影
block.液体工艺-解冻投影.description = 使单位免疫寒冷天气的负面影响。
block.液体工艺-解冻投影.details = 为单位添加对冻结状态的免疫。

block.液体工艺-状态穹顶.name = 状态穹顶
block.液体工艺-状态穹顶.description = 为附近的单位提供超频和保护状态，范围更大，状态持续时间更长。

block.液体工艺-弱化投影.name = 弱化投影
block.液体工艺-弱化投影.description = 对附近的敌人施加弱化状态。

block.液体工艺-麻痹投影.name = 麻痹投影
block.液体工艺-麻痹投影.description = 对附近的敌人施加麻痹状态。

block.液体工艺-缓速投影.name = 缓速投影
block.液体工艺-缓速投影.description = 对附近的敌人施加缓速状态。

block.液体工艺-弱化穹顶.name = 弱化穹顶
block.液体工艺-弱化穹顶.description = 对附近的敌人施加弱化状态，范围更大，状态持续时间更长。

block.液体工艺-麻痹穹顶.name = 麻痹穹顶
block.液体工艺-麻痹穹顶.description = 对附近的敌人施加麻痹状态，范围更大，状态持续时间更长。

block.液体工艺-缓速穹顶.name = 缓速穹顶
block.液体工艺-缓速穹顶.description = 对附近的敌人施加缓速状态，范围更大，状态持续时间更长。



#核心
block.液体工艺-微型核心基座.name = 微型核心基座
block.液体工艺-微型核心基座.description = 建造基座以增加核心数量，也可用于卸载核心物资，核心数量达到12个以后将无法建造。

block.液体工艺-闪电核心.name = 闪电核心
block.液体工艺-闪电核心.description = 改装的终代核心, 自带小型电击能量场以及一定的电力输出。\n核心单位免疫寒冷天气的负面效果。

block.液体工艺-雷霆核心.name = 雷霆核心
block.液体工艺-雷霆核心.description = 闪电核心升级, 更大更好。\n电击能量场范围更大，攻击力更强，电力输出更高。\n核心单位免疫寒冷天气的负面效果。



#炮塔
block.液体工艺-作弊炮塔.name = 作弊炮塔
block.液体工艺-作弊炮塔.description = [red]WDF!
block.液体工艺-作弊炮塔.details = 数值其实是随便填的0.0

block.液体工艺-德鲁伊.name = 德鲁伊
block.液体工艺-德鲁伊.description = 打击中距离地面目标，也可以修复建筑。\n优先攻击残血敌人。

block.液体工艺-电磁风暴.name = 电磁风暴
block.液体工艺-电磁风暴.description = 以固态水为电荷载体，在极短时间内释放出巨大能量。\n被摧毁时电能会以多道电弧的形式释放，伤害周围的敌人。

block.液体工艺-极光.name = 极光
block.液体工艺-极光.description = 锁定范围内血量最高的敌人发射充能激光。\n初始伤害低，但在不切换目标的情况下，伤害会逐渐增加到最大值。

block.液体工艺-电裂.name = 电裂
block.液体工艺-电裂.description = 向敌方战机发射电磁爆裂弹。

block.液体工艺-禁空.name = 禁空
block.液体工艺-禁空.description = 将空中敌人彻底撕碎。

block.液体工艺-破防.name = 破防
block.液体工艺-破防.description = 便宜的造价，高额的输出，但建筑血量极低。\n[red]被摧毁时会发生范围爆炸。
block.液体工艺-破防.details = 牢DIMENSION出品。

block.液体工艺-埋伏.name = 埋伏
block.液体工艺-埋伏.description = 发射地雷攻击敌方地面单位，未被引爆的地雷可继续留存一定的时间。



#墙
block.液体工艺-装甲储液罐.name = 装甲储液罐
block.液体工艺-装甲储液罐.description = 保护己方建筑，挡下敌方炮弹。能够作为储液罐使用。

block.液体工艺-大型装甲储液罐.name = 大型装甲储液罐
block.液体工艺-大型装甲储液罐.description = 保护己方建筑，挡下敌方炮弹。能够作为储液罐使用。

block.液体工艺-塑钢装甲储液罐.name = 塑钢装甲储液罐
block.液体工艺-塑钢装甲储液罐.description = 保护己方建筑，挡下敌方炮弹。能够作为储液罐使用, 兼具塑钢墙的特性。

block.液体工艺-大型塑钢装甲储液罐.name = 大型塑钢装甲储液罐
block.液体工艺-大型塑钢装甲储液罐.description = 保护己方建筑，挡下敌方炮弹。能够作为储液罐使用, 兼具塑钢墙的特性。

block.液体工艺-合金装甲储液罐.name = 合金装甲储液罐
block.液体工艺-合金装甲储液罐.description = 保护己方建筑，挡下敌方炮弹。能够作为储液罐使用, 兼具合金墙的特性。

block.液体工艺-大型合金装甲储液罐.name = 大型合金装甲储液罐
block.液体工艺-大型合金装甲储液罐.description = 保护己方建筑，挡下敌方炮弹。能够作为储液罐使用, 兼具合金墙的特性。

block.液体工艺-相织装甲储液罐.name = 相织装甲储液罐
block.液体工艺-相织装甲储液罐.description = 保护己方建筑，挡下敌方炮弹。能够作为储液罐使用, 兼具相织布墙的特性。

block.液体工艺-大型相织装甲储液罐.name = 大型相织装甲储液罐
block.液体工艺-大型相织装甲储液罐.description = 保护己方建筑，挡下敌方炮弹。能够作为储液罐使用, 兼具相织布墙的特性。

block.液体工艺-超能墙.name = 超能墙
block.液体工艺-超能墙.description = 保护己方建筑，挡下敌方炮弹。综合了所有装甲储液罐的功能，可以放置在深水上。

block.液体工艺-大型超能墙.name = 大型超能墙
block.液体工艺-大型超能墙.description = 保护己方建筑，挡下敌方炮弹。综合了所有装甲储液罐的功能，可以放置在深水上。

block.液体工艺-巨型超能墙.name = 巨型超能墙
block.液体工艺-巨型超能墙.description = 保护己方建筑，挡下敌方炮弹。综合了所有装甲储液罐的功能，可以放置在深水上。



#生产
block.液体工艺-冰冷废液分离机.name = 冰冷废液分离机
block.液体工艺-冰冷废液分离机.description = 直接不稳定低效地提取冰冷废液中的可用物质，多余材料会被焚毁。\n可以获取钛。

block.液体工艺-一级废液解离机.name = 一级废液解离机
block.液体工艺-一级废液解离机.description = 直接不稳定低效地提取一级精炼废液中的可用物质，多余材料会被焚毁。\n可以获取钍。

block.液体工艺-二级废液精馏器.name = 二级废液精馏器
block.液体工艺-二级废液精馏器.description = 从经过两次浓缩的废液中缓慢提取部分合成物质。

block.液体工艺-三级精华转化器.name = 三级精华转化器
block.液体工艺-三级精华转化器.description = 高效提取各种合成物质。

block.液体工艺-四级精华转化仪.name = 四级精华转化仪
block.液体工艺-四级精华转化仪.description = 稳定提取大部分可用物质。

block.液体工艺-终能聚合器.name = 终能聚合器
block.液体工艺-终能聚合器.description = 消耗大量资源和电力，只为提取神秘物质。\n不及时处理积累的液体副产物会导致爆炸。

block.液体工艺-精华提取源.name = 精华提取源
block.液体工艺-精华提取源.description = 将含有少量杂质的神能精华转变为除神秘物质外的任意固体物质。



block.液体工艺-废液离心机.name = 废液离心机
block.液体工艺-废液离心机.description = 初步将冰冷废液提炼为一级精炼废液和废料。

block.液体工艺-再精炼高炉.name = 再精炼高炉
block.液体工艺-再精炼高炉.description = 稳定提取一级精炼废液中的可用金属，同时浓缩未提取的合成物质。

block.液体工艺-精华提取工厂.name = 精华提取工厂
block.液体工艺-精华提取工厂.description = 输入高温矿渣液热解二级精炼废液以获取废液精华。\n建议配合液体卸载器以分离液体输出。

block.液体工艺-精华浓缩厂.name = 精华浓缩厂
block.液体工艺-精华浓缩厂.description = 继续浓缩三级废液中的精华物质以达到提取标准。

block.液体工艺-神能凝聚仪.name = 神能凝聚仪
block.液体工艺-神能凝聚仪.description = 借助神秘物质和其他资源，将输入液体蕴涵的绝大部分神能精华提纯。\n[red]最好不要让其被摧毁。



block.液体工艺-废液混合器.name = 废液混合器
block.液体工艺-废液混合器.description = 将废料和冷冻液混合成废液。

block.液体工艺-冷冻液搅拌机.name = 冷冻液搅拌机
block.液体工艺-冷冻液搅拌机.description = 利用钛、亲水质和冷冻液之间的反应，将少量冷冻液转化为更多的冷冻液。

block.液体工艺-超冷混合器.name = 超冷混合器
block.液体工艺-超冷混合器.description = 将冷冻液和三级精华废液混合以制取超级冷冻液。

block.液体工艺-重水生产器.name = 重水生产器
block.液体工艺-重水生产器.description = 使用钍做催化剂以生产重水。

block.液体工艺-高炉.name = 高炉
block.液体工艺-高炉.description = 将大量废料迅速熔化成矿渣液。

block.液体工艺-大型粉碎机.name = 大型粉碎机
block.液体工艺-大型粉碎机.description = 将废料粉碎成细沙，效率更高。

block.液体工艺-亲水质合成器.name = 亲水质合成器
block.液体工艺-亲水质合成器.description = 使用石墨和水合成亲水质。

block.液体工艺-治愈质压缩机.name = 治愈质压缩机
block.液体工艺-治愈质压缩机.description = 将相织布与亲水质在高压下混合反应形成治愈质，使用冷冻液吸收反应产生的热量。

block.液体工艺-超导裂解器.name = 超导裂解器
block.液体工艺-超导裂解器.description = 消耗巨量电力裂解固态水以制造超导质。

block.液体工艺-固液转化器.name = 固液转化器
block.液体工艺-固液转化器.description = 使用少量亲水质压缩大量液体，形成便于跨区块运输的固态形态的液体。\n同时用于解包固态液体。

block.液体工艺-硅炉.name = 硅炉
block.液体工艺-硅炉.description = 将沙和石墨精炼为硅。

block.液体工艺-塑钢分解器.name = 塑钢分解器
block.液体工艺-塑钢分解器.description = 将塑钢分解为石油和钛。

block.液体工艺-相织布分解器.name = 相织布分解器
block.液体工艺-相织布分解器.description = 将相织布分解为钍和沙。

block.液体工艺-巨浪合金分解器.name = 巨浪合金分解器
block.液体工艺-巨浪合金分解器.description = 将巨浪合金分解为铜，铅，钛和硅。



#物流
block.液体工艺-双传带.name = 双传带
block.液体工艺-双传带.description = 传输物品与液体（同时进行），不会发生泄漏。

block.液体工艺-双传桥.name = 双传桥
block.液体工艺-双传桥.description = 跨越任何地形或建筑物传输物品与液体（同时进行）。

block.液体工艺-双传交叉器.name = 双传交叉器
block.液体工艺-双传交叉器.description = 用于交叉双传带，其两端器件认为直接相连。

block.液体工艺-双传路由器.name = 双传路由器
block.液体工艺-双传路由器.description = 向四个方向平均输出物品与液体,速度更快。
block.液体工艺-双传路由器.details = 串连时的物品传输速度比路由器串连快得多。

block.液体工艺-钍传送带.name = 钍传送带
block.液体工艺-钍传送带.description = 向前运输物品，速度更快。

block.液体工艺-相织布卸载器.name = 相织布卸载器
block.液体工艺-相织布卸载器.description = 从周围的建筑卸载指定物品，速度更快。

block.液体工艺-高压发射器.name = 高压发射器
block.液体工艺-高压发射器.description = 借助水压驱动的廉价质驱, 无需电力，跨越任何地形传输物体。\n发射端和接收端都需要水来驱动。



#液流
