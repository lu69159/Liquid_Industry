#电力
block.液体工艺-碳发电机.name = 碳发电机
block.液体工艺-碳发电机.description = 消耗石墨产生电力，与直接燃烧煤炭相比效率更高。
block.液体工艺-碳发电机.details = “小RTG”

block.液体工艺-重水核反应堆.name = 重水核反应堆
block.液体工艺-重水核反应堆.description = 使用重水作为慢化剂，以极大地提高发电效率，依然需要冷却液供应。\n冷却液或慢化剂供应不足有爆炸可能。

block.液体工艺-爆燃反应炉.name = 爆燃反应炉
block.液体工艺-爆燃反应炉.description = 借助引爆固态石油的冲击力产生大量电力, 并产生废料，需要超级冷冻液冷却。\n超级冷冻液供应不足或废料未及时排出会导致剧烈爆炸！

block.液体工艺-超导节点.name = 超导节点
block.液体工艺-超导节点.description = 连接范围和最大连接数大幅提高的超级电力节点。

block.液体工艺-大型超导节点.name = 大型超导节点
block.液体工艺-大型超导节点.description = 连接范围更大的超级电力节点。

block.液体工艺-超导电力塔.name = 超导电力塔
block.液体工艺-超导电力塔.description = 连接范围更大的超级电力节点。

block.液体工艺-超导电池.name = 超导电池
block.液体工艺-超导电池.description = 储存电网多余电力，并在电网供电不足时放电。

block.液体工艺-大型超导电池.name = 大型超导电池
block.液体工艺-大型超导电池.description = 储存电网多余电力，并在电网供电不足时放电。\n比超导电池电力容量更高。



#辅助
block.液体工艺-中型照明器.name = 中型照明器
block.液体工艺-中型照明器.description = 提供照明，更大更亮。

block.液体工艺-大型照明器.name = 大型照明器
block.液体工艺-大型照明器.description = 提供照明，更大更亮。

