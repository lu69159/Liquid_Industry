block.液体工艺-多幂级单位直构工厂.description = 将输入的一级单位直接重构为第四级。

block.液体工艺-无量级单位直构工厂.name = 无量级单位直构工厂
block.液体工艺-无量级单位直构工厂.description = 将输入的一级单位直接重构为第五级。

